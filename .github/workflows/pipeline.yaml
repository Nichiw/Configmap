name: Pipeline de Segurança

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ─────────────────────────────────────────
  # SAST - Semgrep
  # ─────────────────────────────────────────
  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Semgrep
        run: pip install semgrep

      - name: Rodar Semgrep (regras padrão Python)
        run: |
          semgrep scan \
            --config=auto \
            --json \
            --output=semgrep-results.json \
            ./app || true

      - name: Rodar Semgrep (regra customizada - print vs logger)
        run: |
          semgrep scan \
            --config=semgrep-rules/no-print.yaml \
            --json \
            --output=semgrep-custom-results.json \
            ./app || true

      - name: Exibir resultado da regra customizada
        run: |
          echo "===== Resultados da regra customizada (print vs logger) ====="
          cat semgrep-custom-results.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          results = data.get('results', [])
          if not results:
              print('Nenhuma ocorrência encontrada.')
          else:
              print(f'Total de ocorrências: {len(results)}')
              for r in results:
                  print(f\"  - {r['path']}:{r['start']['line']} → {r['extra']['message']}\")
          "

      - name: Upload dos relatórios Semgrep
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-reports
          path: |
            semgrep-results.json
            semgrep-custom-results.json

  # ─────────────────────────────────────────
  # SCA - FOSSA
  # ─────────────────────────────────────────
  sca-fossa:
    name: SCA - FOSSA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar FOSSA CLI
        run: |
          curl -H 'Cache-Control: no-cache' \
            https://raw.githubusercontent.com/fossas/fossa-cli/master/install-latest.sh \
            | bash

      - name: Analisar dependências com FOSSA
        env:
          FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
        run: fossa analyze

      - name: Verificar licenças e vulnerabilidades
        env:
          FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
        run: fossa test --json > fossa-results.json || true

      - name: Upload do relatório FOSSA
        uses: actions/upload-artifact@v4
        with:
          name: fossa-report
          path: fossa-results.json

  # ─────────────────────────────────────────
  # Relatório consolidado
  # ─────────────────────────────────────────
  relatorio:
    name: Gerar Relatório Consolidado
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sca-fossa]
    if: always()

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Baixar relatório Semgrep
        uses: actions/download-artifact@v4
        with:
          name: semgrep-reports

      - name: Baixar relatório FOSSA
        uses: actions/download-artifact@v4
        with:
          name: fossa-report

      - name: Gerar relatório consolidado em Markdown
        run: |
          python3 << 'EOF'
          import json, os
          from datetime import datetime

          relatorio = []
          relatorio.append("# Relatório de Segurança\n")
          relatorio.append(f"**Data:** {datetime.now().strftime('%d/%m/%Y %H:%M')}  ")
          relatorio.append(f"**Commit:** {os.environ.get('GITHUB_SHA', 'N/A')[:7]}  ")
          relatorio.append(f"**Branch:** {os.environ.get('GITHUB_REF_NAME', 'N/A')}  ")
          relatorio.append("\n---\n")

          # Semgrep - regras padrão
          relatorio.append("## SAST - Semgrep (Regras Padrão)\n")
          try:
              with open("semgrep-results.json") as f:
                  data = json.load(f)
              results = data.get("results", [])
              relatorio.append(f"**Total de ocorrências:** {len(results)}\n")
              if results:
                  relatorio.append("| Arquivo | Linha | Regra | Severidade |")
                  relatorio.append("|---------|-------|-------|------------|")
                  for r in results:
                      path = r.get("path", "")
                      line = r.get("start", {}).get("line", "")
                      rule = r.get("check_id", "")
                      sev  = r.get("extra", {}).get("severity", "")
                      relatorio.append(f"| {path} | {line} | {rule} | {sev} |")
              else:
                  relatorio.append("Nenhuma ocorrência encontrada.")
          except Exception as e:
              relatorio.append(f"Erro ao processar: {e}")

          relatorio.append("\n---\n")

          # Semgrep - regra customizada
          relatorio.append("## SAST - Semgrep (Regra Customizada: print vs logger)\n")
          try:
              with open("semgrep-custom-results.json") as f:
                  data = json.load(f)
              results = data.get("results", [])
              relatorio.append(f"**Total de ocorrências:** {len(results)}\n")
              if results:
                  relatorio.append("| Arquivo | Linha | Trecho |")
                  relatorio.append("|---------|-------|--------|")
                  for r in results:
                      path = r.get("path", "")
                      line = r.get("start", {}).get("line", "")
                      snippet = r.get("extra", {}).get("lines", "").strip()
                      relatorio.append(f"| {path} | {line} | `{snippet}` |")
              else:
                  relatorio.append("Nenhuma ocorrência de `print()` encontrada.")
          except Exception as e:
              relatorio.append(f"Erro ao processar: {e}")

          relatorio.append("\n---\n")

          # FOSSA
          relatorio.append("## SCA - FOSSA (Licenças e Vulnerabilidades)\n")
          try:
              with open("fossa-results.json") as f:
                  data = json.load(f)
              issues = data.get("issues", [])
              relatorio.append(f"**Total de issues:** {len(issues)}\n")
              if issues:
                  relatorio.append("| Pacote | Tipo | Severidade |")
                  relatorio.append("|--------|------|------------|")
                  for i in issues:
                      pkg  = i.get("revisionId", "")
                      tipo = i.get("type", "")
                      sev  = i.get("severity", "N/A")
                      relatorio.append(f"| {pkg} | {tipo} | {sev} |")
              else:
                  relatorio.append("Nenhuma issue encontrada.")
          except Exception as e:
              relatorio.append(f"Erro ao processar relatório FOSSA: {e}")

          relatorio.append("\n---\n")
          relatorio.append("_Relatório gerado automaticamente pelo GitHub Actions._\n")

          with open("relatorio-seguranca.md", "w") as f:
              f.write("\n".join(relatorio))

          print("Relatório gerado com sucesso!")
          EOF

      - name: Upload do relatório consolidado
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-seguranca
          path: relatorio-seguranca.md
