name: Pipeline de Segurança

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ─────────────────────────────────────────
  # SCA - FOSSA
  # ─────────────────────────────────────────
  sca-fossa:
    name: SCA - FOSSA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar FOSSA CLI
        run: |
          curl -H 'Cache-Control: no-cache' \
            https://raw.githubusercontent.com/fossas/fossa-cli/master/install-latest.sh \
            | bash

      - name: Analisar dependências com FOSSA
        env:
          FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
        run: fossa analyze

      - name: Verificar licenças e vulnerabilidades
        env:
          FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
        run: fossa test

# ─────────────────────────────────────────
  # SAST - Semgrep
  # ─────────────────────────────────────────
  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Semgrep
        run: pip install semgrep

      - name: Rodar Semgrep (regras padrão)
        run: semgrep scan

      - name: Rodar Semgrep (regra - print vs logger)
        run: semgrep scan --config k8s-users/semgrep-rules/no-print.yaml
