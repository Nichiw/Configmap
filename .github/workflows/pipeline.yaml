name: Pipeline de Segurança

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ─────────────────────────────────────────
  # SCA - FOSSA
  # ─────────────────────────────────────────
  sca-fossa:
    name: SCA - FOSSA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar FOSSA CLI
        run: |
          curl -H 'Cache-Control: no-cache' \
            https://raw.githubusercontent.com/fossas/fossa-cli/master/install-latest.sh \
            | bash

      - name: Analisar dependências com FOSSA
        env:
          FOSSA_API_KEY: ${{secrets.FOSSA_API_KEY}}
        run: fossa analyze

      - name: Verificar licenças e vulnerabilidades
        env:
          FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
        run: fossa test --json > fossa-results.json || true

      - name: Upload do relatório FOSSA
        uses: actions/upload-artifact@v4
        with:
          name: fossa-report
          path: fossa-results.json
# ─────────────────────────────────────────
# SAST - Semgrep
# ─────────────────────────────────────────
  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Semgrep
        run: pip install semgrep

      - name: Rodar Semgrep (regras padrão Python)
        run: |
          semgrep scan \
            --config=auto \
            --json \
            --output=semgrep-results.json \
            ./app || true

      - name: Rodar Semgrep (regra customizada - print vs logger)
        run: |
          semgrep scan \
            --config=semgrep-rules/no-print.yaml \
            --json \
            --output=semgrep-custom-results.json \
            ./app || true

      - name: Exibir resultado da regra customizada
        run: |
          echo "===== Resultados da regra customizada (print vs logger) ====="
          cat semgrep-custom-results.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          results = data.get('results', [])
          if not results:
              print('Nenhuma ocorrência encontrada.')
          else:
              print(f'Total de ocorrências: {len(results)}')
              for r in results:
                  print(f\"  - {r['path']}:{r['start']['line']} → {r['extra']['message']}\")
          "

      - name: Upload dos relatórios Semgrep
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-reports
          path: |
            semgrep-results.json
            semgrep-custom-results.json
